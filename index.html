<!DOCTYPE html>
<html lang="en-us" data-theme="default">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matchmoji</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>

<body id="root" hidden>
  <p>Match the emojis by clicking on the ones on the right and clicking on the X next to their pair</p>
  <div id="emojis">
    <ul id="primary-list">
    </ul>
    <ul id="secondary-list">
    </ul>
  </div>
  <div id="buttons">
    <button onclick="solve()" id="solvebutton">Check solution</button>
    <button onclick="retry()" id="retrybutton" hidden>Retry?</button>
  </div>
</body>

</html>
